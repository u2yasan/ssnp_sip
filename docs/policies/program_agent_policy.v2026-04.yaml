policy_version: "2026-04"
heartbeat_interval_seconds: 300

cpu_profile:
  id: "cpu-check-v1"
  duration_seconds: 180
  warmup_seconds: 30
  measured_seconds: 120
  cooldown_seconds: 30
  worker_cap: 8
  workload_mix:
    hashing: 0.50
    integer: 0.30
    matrix: 0.20
  acceptance_floor:
    type: "normalized_score"
    minimum: 1.00

disk_profile:
  id: "disk-check-v1"
  duration_seconds: 60
  warmup_seconds: 10
  measured_seconds: 40
  cooldown_seconds: 10
  block_size_bytes: 4096
  queue_depth: 32
  concurrency: 4
  read_ratio: 0.70
  write_ratio: 0.30
  acceptance_floor:
    type: "measured_iops"
    minimum: 1500

hardware_thresholds:
  cpu_cores_min: 8
  ram_gb_min: 32
  storage_gb_min: 750
  ssd_required: true

probe_thresholds:
  finalized_lag_max_blocks: 2
  chain_lag_max_blocks: 5

reference_environment:
  id: "ref-env-2026-04"
  os_image_id: "ubuntu-24.04-lts"
  agent_version: "1.0.0"
  cpu_profile_id: "cpu-check-v1"
  disk_profile_id: "disk-check-v1"
  baseline_source_date: "2026-04-06"
