name: go-test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  agent_py:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agent_py
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip
      - run: pip install -e .
      - run: python -m unittest discover -s tests -v
      - run: python -m compileall ssnp_agent

  portal:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: portal
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: |
            portal/go.sum
            probe/go.sum
      - run: go test ./...
      - run: go build ./...

  probe:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: probe
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: probe/go.sum
      - run: go test ./...
      - run: go build ./...

  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: |
            portal/go.sum
            probe/go.sum
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip
      - run: pip install -e ./agent_py
      - run: make smoke
