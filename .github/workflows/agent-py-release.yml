name: agent-py-release

on:
  push:
    tags:
      - "agent-v*"

jobs:
  build-release:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agent_py
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip
      - run: pip install -e .
      - run: python -m unittest discover -s tests -v
      - run: ../scripts/build-agent-py-release.sh
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            agent_py/dist/release/ssnp_agent-*.whl
            agent_py/dist/release/ssnp_agent-*.tar.gz
            agent_py/dist/release/requirements-lock.txt
            agent_py/dist/release/config.example.yaml
            agent_py/dist/release/ssnp-agent.service
            agent_py/dist/release/SHA256SUMS
